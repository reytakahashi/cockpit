    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&family=Inter:wght@400;600;700;900&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0F0F14}
    .card{background:#1A1A24;border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 4px 24px rgba(0,0,0,0.3)}
    .card-light{background:#FFFFFF;border:1px solid #E8E8E5;border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
    .lbl{font-size:10px;color:#6B7280;text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px;font-family:'DM Mono',monospace;font-weight:600}
    .lbl-light{font-size:10px;color:#787873;text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px;font-family:'DM Mono',monospace;font-weight:600}
    .hbtn{cursor:pointer;border:none;border-radius:8px;padding:9px 12px;font-family:inherit;font-size:13px;transition:all .15s;display:flex;align-items:flex-start;gap:9px;width:100%;text-align:left;margin-bottom:4px}
    .hbtn:hover{filter:brightness(1.1)}
    .pbar{height:5px;border-radius:3px;background:rgba(255,255,255,0.08);overflow:hidden;margin-top:4px}
    .pbar-light{height:5px;border-radius:3px;background:#E0E0DC;overflow:hidden;margin-top:4px}
    .pfill{height:100%;border-radius:3px;transition:width .5s ease}
    .mbtn{cursor:pointer;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:5px 13px;font-size:11px;font-family:inherit;color:#9CA3AF;transition:all .15s;font-weight:500}
    .mbtn:hover,.mbtn.on{background:rgba(251,146,60,0.15);color:#FB923C;border-color:rgba(251,146,60,0.4)}
    .mbtn.red{border-color:#F87171;color:#F87171}
    .mbtn.red.on,.mbtn.red:hover{background:rgba(248,113,113,0.1)}
    .tab{cursor:pointer;padding:6px 14px;border-radius:18px;font-size:12px;font-family:inherit;border:none;transition:all .15s;white-space:nowrap;font-weight:600;color:#6B7280;background:transparent}
    .tab:hover{color:#D1D5DB;background:rgba(255,255,255,0.05)}
    .tab.active-tab{background:linear-gradient(135deg,rgba(251,146,60,0.2),rgba(251,191,36,0.15));color:#FB923C;border:1px solid rgba(251,146,60,0.3)}
    .task-row{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);margin-bottom:6px;transition:all .15s}
    .task-row:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.15)}
    .task-row.hi{border-color:rgba(251,146,60,0.4);background:rgba(251,146,60,0.06)}
    .chk{cursor:pointer;width:20px;height:20px;border-radius:5px;border:2px solid rgba(255,255,255,0.2);background:transparent;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px;transition:all .15s}
    .chk:hover{border-color:#FB923C}
    .ib{cursor:pointer;background:transparent;border:none;color:rgba(255,255,255,0.2);font-size:13px;padding:2px 4px;transition:color .15s;flex-shrink:0}
    .ib:hover{color:#9CA3AF}
    input[type=text],input[type=number]{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:7px;color:#F3F4F6;padding:7px 11px;font-size:13px;font-family:inherit;outline:none;transition:border .15s}
    input[type=text]:focus,input[type=number]:focus{border-color:#FB923C;box-shadow:0 0 0 3px rgba(251,146,60,0.15)}
    input[type=number]{width:80px}
    textarea{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#F3F4F6;padding:10px 12px;font-size:13px;font-family:inherit;outline:none;resize:vertical;width:100%;line-height:1.7}
    textarea:focus{border-color:#FB923C;box-shadow:0 0 0 3px rgba(251,146,60,0.15)}
    textarea::placeholder{color:rgba(255,255,255,0.2)}
    input::placeholder{color:rgba(255,255,255,0.2)}
    select{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:7px;color:#F3F4F6;padding:8px 11px;font-size:13px;font-family:inherit;outline:none;cursor:pointer}
    .energy-btn{cursor:pointer;border-radius:10px;padding:11px 14px;font-family:inherit;font-size:12px;transition:all .15s;text-align:center;font-weight:500}
    .ptag{font-size:10px;padding:2px 8px;border-radius:5px;font-weight:700;flex-shrink:0;margin-top:2px}
    .log-card{border-radius:10px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);padding:14px;margin-bottom:10px}
    .log-badge{font-size:11px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:3px 9px;color:#9CA3AF;white-space:nowrap;font-weight:500}
    .log-badge span{color:#F3F4F6;font-weight:700}
    .log-text{font-size:12px;color:#9CA3AF;line-height:1.75;padding:9px 11px;background:rgba(255,255,255,0.04);border-radius:7px;border-left:3px solid #FB923C}
    .ai-row{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);margin-bottom:5px}
    .section-toggle{cursor:pointer;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px 12px;font-family:inherit;font-size:12px;color:#9CA3AF;width:100%;text-align:left;transition:all .15s;display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
    .section-toggle:hover{background:rgba(255,255,255,0.07);color:#D1D5DB}
    @keyframes launch-in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
