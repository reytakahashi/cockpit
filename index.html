<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rei Cockpit</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;background:#F8F9FA;color:#1a1a1a}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #EDEDEA}
.lbl{font-size:11px;font-weight:700;letter-spacing:.04em;color:#787873;text-transform:uppercase;margin-bottom:8px}
.mbtn{background:#F0F0ED;border:1px solid #D4D4D0;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit;color:#4A4A47;font-weight:500}
.mbtn:hover{background:#E8E8E5}
.ib{background:none;border:none;cursor:pointer;font-family:inherit}
.tab-bar{display:flex;gap:4px;padding:10px 12px 0;background:#fff;border-bottom:1px solid #EDEDEA;overflow-x:auto;position:sticky;top:0;z-index:10}
.tab{padding:8px 14px;border-radius:8px 8px 0 0;border:none;background:none;font-size:12px;font-weight:600;cursor:pointer;color:#787873;white-space:nowrap;font-family:inherit}
.tab.active{background:#F8F9FA;color:#1a1a1a;border:1px solid #EDEDEA;border-bottom:1px solid #F8F9FA;margin-bottom:-1px}
.energy-btn{flex:1;padding:10px 6px;border-radius:10px;border:2px solid #EDEDEA;background:#FAFAF8;cursor:pointer;font-family:inherit;transition:all .15s}
.energy-btn.active{border-color:#60A5FA;background:#EFF6FF}
input,textarea{border:1px solid #D4D4D0;border-radius:8px;padding:7px 10px;font-family:inherit;font-size:13px;outline:none;width:100%}
input:focus,textarea:focus{border-color:#93C5FD;box-shadow:0 0 0 3px rgba(147,197,253,.15)}
</style>
</head>
